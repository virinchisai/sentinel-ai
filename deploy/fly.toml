# fly.io deploy config. Run `fly launch --copy-config --dockerfile deploy/Dockerfile`
# from the project root, or `fly deploy --config deploy/fly.toml --dockerfile deploy/Dockerfile`.
app = "enterprise-ai-assistant"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[mounts]
  source = "chroma_data"
  destination = "/app/.chroma"
